#cloud-config
users:
  - name: ${USER_NAME}
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash
    ssh_authorized_keys:
      - \"${SSH_KEY}\"

  - name: nginxuser
    shell: /bin/bash
    system: true

package_upgrade: true
packages:
  - wireguard-tools
  - podman
  - systemd-container

write_files:
  - path: /etc/wireguard/wg0.conf
    content: |
      [Interface]
      PrivateKey = ${WG_PRIV_KEY}
      ListenPort = 13231
      Address = 172.16.16.1/24

      [Peer]
      PublicKey = ${WG_PUB_KEY}
      AllowedIPs = 172.16.16.90/32
    permissions: '0600'

  - path: /etc/systemd/system/wg-quick@.service.d/override.conf
    content: |
      [Unit]
      Before=sshd.service
      
      [Service]
      Type=oneshot
      RemainAfterExit=yes
    permissions: '0644'

  - path: /etc/ssh/sshd_config
    content: |
      Port 22
      Protocol 2
      PermitRootLogin no
      PubkeyAuthentication yes
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      UsePAM no
      X11Forwarding no
      AllowTcpForwarding no
      AllowAgentForwarding no
      PermitTunnel no
      PrintMotd yes
      AcceptEnv LANG LC_*
      AllowUsers ${USER_NAME}
      ListenAddress 172.16.16.1
    permissions: '0600'

  - path: /etc/sysctl.conf
    content: |
      net.ipv4.ip_forward=1
      net.ipv6.conf.all.disable_ipv6=1
      net.ipv6.conf.default.disable_ipv6=1
      net.ipv6.conf.lo.disable_ipv6=1
      vm.swappiness = 10
      vm.vfs_cache_pressure=50
      vm.overcommit_memory = 1
      net.ipv4.ip_unprivileged_port_start=80
    permissions: '0644'

  - path: /etc/containers/containers.conf
    content: |
      [containers]
      label=true
      
      [engine]
      runtime="crun"
      
      [engine.runtimes]
      crun = [
          "/usr/bin/crun"
      ]
    permissions: '0644'

  - path: /home/nginxuser/.config/containers/systemd/nginx.container
    content: |
      [Unit]
      Description=Nginx Container
      After=network-online.target

      [Container]
      Image=docker.io/library/nginx:stable-alpine
      PublishPort=80:80
      PublishPort=443:443
      Volume=/home/nginxuser/nginx/conf:/etc/nginx:ro
      Volume=/home/nginxuser/nginx/html:/usr/share/nginx/html:ro
      Volume=/home/nginxuser/nginx/certs:/etc/nginx/certs:ro
      User=nginxuser
      Group=nginxuser
      SecurityLabelType=container_runtime_t

      [Service]
      Restart=always

      [Install]
      WantedBy=default.target
    permissions: '0644'

  - path: /home/nginxuser/nginx/conf/nginx.conf
    content: |
      events {
          worker_connections 1024;
      }

      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;

          sendfile        on;
          keepalive_timeout  65;

          server {
              listen       80;
              server_name  localhost;

              location / {
                  root   /usr/share/nginx/html;
                  index  index.html;
              }

              error_page   500 502 503 504  /50x.html;
              location = /50x.html {
                  root   /usr/share/nginx/html;
              }
          }
      }
    permissions: '0644'

  - path: /home/nginxuser/nginx/html/index.html
    content: |
      <!DOCTYPE html>
      <html>
      <head>
          <title>Welcome to nginx!</title>
      </head>
      <body>
          <h1>Welcome to nginx!</h1>
          <p>If you see this page, the nginx container is working correctly.</p>
      </body>
      </html>
    permissions: '0644'

swap:
  filename: /swapfile
  size: auto

runcmd:
  - [dnf, -y, install, epel-release]
  - [dnf, -y, install, wireguard-tools]
  - [semanage, port, -a, -t, http_port_t, -p, tcp, 13231]
  - [setsebool, -P, container_manage_cgroup, 1]
  - [usermod, -p, '*', ${USER_NAME}]
  - [systemctl, daemon-reload]
  - [systemctl, enable, wg-quick@wg0]
  - [systemctl, start, wg-quick@wg0]
  - [systemctl, restart, sshd]
  - [git, clone, https://github.com/heroalex/server.git, /root/server]
  - [chmod, +x, /root/server/scripts/init_userhome.sh]
  - [chmod, +x, /root/server/scripts/test_cloud-config.sh]
  - [/root/server/scripts/init_userhome.sh, ${USER_NAME}]
  - [mkdir, -p, /home/nginxuser/.config/containers/systemd]
  - [mkdir, -p, /home/nginxuser/nginx/conf, /home/nginxuser/nginx/html, /home/nginxuser/nginx/certs]
  - [chown, -R, nginxuser:nginxuser, /home/nginxuser]
  - [loginctl, enable-linger, nginxuser]
  - [systemctl, --user, -M, nginxuser@, daemon-reload]
  - [systemctl, --user, -M, nginxuser@, enable, --now, container-nginx]

power_state:
  mode: reboot
  timeout: 300
  condition: True