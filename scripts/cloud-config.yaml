#cloud-config
users:
  - name: ${USER_NAME}
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash
    uid: 1000
    ssh_authorized_keys:
      - \"${SSH_KEY}\"

  - name: registryuser
    shell: /bin/bash
    system: true
    uid: 1001

  - name: nginxuser
    shell: /bin/bash
    system: true
    uid: 1002

package_upgrade: true
packages:
  - wireguard
  - podman
  - lxd
  - systemd-container
  - cifs-utils

write_files:
  - path: /etc/wireguard/wg0.conf
    content: |
      [Interface]
      PrivateKey = ${WG_PRIV_KEY}
      ListenPort = 13231
      Address = 172.16.16.1/24

      [Peer]
      PublicKey = ${WG_PUB_KEY}
      AllowedIPs = 172.16.16.90/32
    permissions: '0600'

  - path: /etc/systemd/system/wg-quick@.service.d/override.conf
    content: |
      [Unit]
      Before=ssh.service
      
      [Service]
      Type=oneshot
      RemainAfterExit=yes
    permissions: '0644'

  - path: /etc/ssh/sshd_config
    content: |
      Port 22
      Protocol 2
      PermitRootLogin no
      PubkeyAuthentication yes
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      UsePAM no
      X11Forwarding no
      AllowTcpForwarding no
      AllowAgentForwarding no
      PermitTunnel no
      PrintMotd yes
      AcceptEnv LANG LC_*
      AllowUsers ${USER_NAME}
      ListenAddress 172.16.16.1
    permissions: '0600'

  - path: /etc/sysctl.conf
    content: |
      net.ipv4.ip_forward=1
      net.ipv6.conf.all.disable_ipv6=1
      net.ipv6.conf.default.disable_ipv6=1
      net.ipv6.conf.lo.disable_ipv6=1
      vm.swappiness = 10
      vm.vfs_cache_pressure=50
      vm.overcommit_memory = 1
      net.ipv4.ip_unprivileged_port_start=80
    permissions: '0644'

  - path: /home/registryuser/creds-storage
    content: |
      username=u324047-sub5
      password=${STORAGE_L1}
    permissions: '0600'

swap:
  filename: /swapfile
  size: auto

runcmd:
  - [usermod, -p, '*', ${USER_NAME}]
  - [systemctl, daemon-reload]
  - [systemctl, enable, wg-quick@wg0]
  - [systemctl, start, wg-quick@wg0]
  - [systemctl, restart, ssh]
# init users
  - [ git, clone, https://github.com/heroalex/server.git, /root/server ]
# user
  - [ chmod, +x, /root/server/scripts/init_userhome.sh ]
  - [ /root/server/scripts/init_userhome.sh, ${USER_NAME} ]
# registryuser
  - [ chmod, +x, /root/server/scripts/init_registryuser.sh ]
  - [ /root/server/scripts/init_registryuser.sh, registryuser ]
# nginxuser
  - [chmod, +x, /root/server/scripts/init_nginxuser.sh]
  - [/root/server/scripts/init_nginxuser.sh, nginxuser]
# test_cloud-config
  - [chmod, +x, /root/server/scripts/test_cloud-config.sh]

power_state:
  mode: reboot
  timeout: 300
  condition: True